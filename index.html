<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거울 던전 기록보관소 — 인격 뷰어</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="eyebrow">LIMBUS MIRROR DUNGEON ARCHIVE</div>
  <h1>거울 던전 기록보관소</h1>
  <p>parse_persona.py로 추출한 인격 JSON을 불러와 조회합니다.</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <label class="file-drop" id="fileDrop">
      <span class="big">＋</span>
      인격 JSON 파일 불러오기<br>
      <span style="font-size:11px">(여러 개 선택 가능)</span>
      <input type="file" id="fileInput" accept=".json" multiple>
    </label>

    <div class="search">
      <input type="text" id="searchInput" placeholder="인격명 / 수감자 검색…">
    </div>

    <div class="filter-row" id="rarityFilter"></div>
    <div class="filter-row" id="sinnerFilter"></div>

    <div class="persona-list" id="personaList">
      <div class="empty-sidebar">아직 불러온 인격이 없습니다.<br>위에서 JSON 파일을 선택하세요.</div>
    </div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="placeholder">
      <div class="mark">SELECT A FILE</div>
      <div>왼쪽에서 인격을 불러오고 선택하세요</div>
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
