<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거울 던전 기록보관소 — 인격 뷰어</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Pretendard:wght@400;500;600;700&display=swap');

  :root{
    --bg-0:#100e0b;
    --bg-1:#171310;
    --bg-2:#1f1a15;
    --line:#3a3128;
    --ink:#e8ddc7;
    --ink-dim:#a89a80;
    --ink-faint:#6b6050;
    --blood:#8a2f22;
    --blood-bright:#c8492f;
    --gold:#b8944a;

    --sin-나태:#4f7a4a;
    --sin-탐식:#c9762b;
    --sin-색욕:#c1568a;
    --sin-분노:#a3312a;
    --sin-우울:#3f6fa8;
    --sin-허영:#c4a83a;
    --sin-질투:#3a8f72;
    --sin-오만:#8a5fc4;

    --font-display:'Noto Serif KR', serif;
    --font-body:'Pretendard', -apple-system, sans-serif;
    --font-mono:'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:
      radial-gradient(ellipse at 20% -10%, #211a13 0%, transparent 55%),
      var(--bg-0);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
  }

  /* 배경 노이즈 텍스처 */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, transparent 1px, transparent 2px, rgba(255,255,255,0.012) 3px);
    pointer-events:none;
    z-index:1000;
  }

  header{
    padding:28px 32px 20px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, var(--bg-1), transparent);
  }
  header .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.25em;
    color:var(--blood-bright);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  header h1{
    font-family:var(--font-display);
    font-weight:900;
    font-size:28px;
    letter-spacing:-0.01em;
  }
  header p{
    color:var(--ink-dim);
    font-size:13px;
    margin-top:6px;
  }

  .layout{
    display:grid;
    grid-template-columns:320px 1fr;
    min-height:calc(100vh - 96px);
  }
  @media (max-width: 860px){
    .layout{ grid-template-columns:1fr; }
  }

  /* ── 사이드바 ───────────────────────── */
  .sidebar{
    border-right:1px solid var(--line);
    background:var(--bg-1);
    padding:20px;
    display:flex; flex-direction:column; gap:16px;
  }

  .file-drop{
    border:1px dashed var(--line);
    border-radius:2px;
    padding:16px;
    text-align:center;
    font-size:12px;
    color:var(--ink-faint);
    cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .file-drop:hover, .file-drop.dragover{
    border-color:var(--blood-bright);
    color:var(--ink-dim);
  }
  .file-drop input{ display:none; }
  .file-drop .big{
    font-family:var(--font-mono);
    font-size:20px;
    color:var(--gold);
    display:block;
    margin-bottom:6px;
  }

  .search input{
    width:100%;
    background:var(--bg-2);
    border:1px solid var(--line);
    color:var(--ink);
    padding:9px 10px;
    font-size:13px;
    font-family:var(--font-body);
    border-radius:2px;
  }
  .search input:focus{
    outline:none;
    border-color:var(--blood-bright);
  }
  .search input::placeholder{ color:var(--ink-faint); }

  .filter-row{
    display:flex; gap:6px; flex-wrap:wrap;
  }
  .chip{
    font-family:var(--font-mono);
    font-size:11px;
    padding:4px 9px;
    border:1px solid var(--line);
    border-radius:2px;
    color:var(--ink-dim);
    cursor:pointer;
    background:transparent;
    transition:all .12s;
  }
  .chip.active{
    border-color:var(--blood-bright);
    color:var(--blood-bright);
    background:rgba(200,73,47,0.08);
  }

  .persona-list{
    flex:1;
    overflow-y:auto;
    display:flex; flex-direction:column;
    gap:1px;
    margin:0 -20px;
  }
  .persona-item{
    padding:11px 20px;
    cursor:pointer;
    border-left:2px solid transparent;
    display:flex;
    flex-direction:column;
    gap:3px;
    transition:background .12s;
  }
  .persona-item:hover{ background:var(--bg-2); }
  .persona-item.active{
    background:var(--bg-2);
    border-left-color:var(--blood-bright);
  }
  .persona-item .pname{
    font-size:13px; font-weight:600;
    color:var(--ink);
  }
  .persona-item .pmeta{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--ink-faint);
    display:flex; gap:8px; align-items:center;
  }
  .rarity-dot{
    display:inline-block;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--gold);
  }

  .empty-sidebar{
    color:var(--ink-faint);
    font-size:12px;
    text-align:center;
    padding:24px 8px;
    line-height:1.6;
  }

  /* ── 메인 패널 ───────────────────────── */
  .main{
    padding:36px 44px;
    overflow-y:auto;
  }
  .placeholder{
    height:70vh;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    gap:10px;
    color:var(--ink-faint);
  }
  .placeholder .mark{
    font-family:var(--font-display);
    font-size:15px;
    letter-spacing:0.15em;
    color:var(--ink-dim);
  }

  .dossier-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    border-bottom:1px solid var(--line);
    padding-bottom:20px;
    margin-bottom:24px;
    gap:20px;
  }
  .dossier-head .titles .sinner{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.2em;
    color:var(--blood-bright);
    text-transform:uppercase;
  }
  .dossier-head .titles h2{
    font-family:var(--font-display);
    font-weight:700;
    font-size:26px;
    margin-top:4px;
  }
  .dossier-head .titles .sub{
    color:var(--ink-dim);
    font-size:12px;
    margin-top:6px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }

  .stamp{
    font-family:var(--font-mono);
    font-weight:700;
    font-size:13px;
    color:var(--blood-bright);
    border:2px solid var(--blood-bright);
    padding:6px 14px;
    border-radius:3px;
    transform:rotate(-6deg);
    white-space:nowrap;
    letter-spacing:0.08em;
    flex-shrink:0;
  }

  .grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    margin-bottom:28px;
  }
  @media (max-width: 700px){ .grid-2{ grid-template-columns:1fr; } }

  .panel{
    background:var(--bg-1);
    border:1px solid var(--line);
    border-radius:3px;
    padding:16px 18px;
  }
  .panel h3{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.18em;
    color:var(--ink-faint);
    text-transform:uppercase;
    margin-bottom:12px;
  }

  .stat-row{
    display:flex; justify-content:space-between;
    font-family:var(--font-mono);
    font-size:13px;
    padding:5px 0;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .stat-row:last-child{ border-bottom:none; }
  .stat-row .k{ color:var(--ink-faint); }
  .stat-row .v{ color:var(--ink); }

  .resist-row{
    display:flex; justify-content:space-between; align-items:center;
    font-size:12.5px;
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .resist-row:last-child{ border-bottom:none; }
  .resist-tag{
    font-family:var(--font-mono);
    font-size:10.5px;
    padding:2px 8px;
    border-radius:2px;
  }
  .resist-tag.취약{ background:rgba(163,49,42,0.25); color:#e08276; }
  .resist-tag.보통{ background:rgba(168,154,128,0.15); color:var(--ink-dim); }
  .resist-tag.내성{ background:rgba(63,111,168,0.25); color:#8db3dd; }

  section.block{ margin-bottom:30px; }
  section.block > h3{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.2em;
    color:var(--ink-faint);
    text-transform:uppercase;
    margin-bottom:14px;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }

  .skill-card{
    background:var(--bg-1);
    border:1px solid var(--line);
    border-left:3px solid var(--blood);
    border-radius:2px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .skill-card.defense{ border-left-color:var(--gold); }
  .skill-head{
    display:flex; justify-content:space-between; align-items:baseline;
    flex-wrap:wrap; gap:8px;
    margin-bottom:10px;
  }
  .skill-head .sname{
    font-family:var(--font-display);
    font-weight:700;
    font-size:16px;
  }
  .sin-tag{
    font-family:var(--font-mono);
    font-size:10.5px;
    padding:2px 8px;
    border-radius:2px;
    color:#0d0b09;
    font-weight:600;
  }
  .skill-stats{
    display:flex;
    gap:16px;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--ink-dim);
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  .skill-stats b{ color:var(--ink); }
  .coin-effect{
    font-size:12.5px;
    color:var(--ink-dim);
    padding:6px 0;
    border-top:1px solid rgba(255,255,255,0.05);
    line-height:1.55;
  }
  .coin-effect .cond{
    font-family:var(--font-mono);
    color:var(--gold);
    font-size:11px;
    margin-right:6px;
  }

  .passive-card{
    background:var(--bg-1);
    border:1px solid var(--line);
    border-radius:2px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .passive-card .ptitle{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:6px;
  }
  .passive-card .pname{
    font-family:var(--font-display);
    font-weight:700; font-size:15px;
  }
  .passive-card .ptype{
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--ink-faint);
  }
  .passive-card .pdesc{
    font-size:12.5px;
    color:var(--ink-dim);
    line-height:1.6;
  }

  .sync-stage{
    display:grid;
    grid-template-columns:70px 1fr;
    gap:14px;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .sync-stage:last-child{ border-bottom:none; }
  .sync-stage .snum{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--gold);
  }
  .sync-stage .seff{
    font-size:12.5px;
    color:var(--ink-dim);
    line-height:1.6;
  }

  .sanity-list{
    list-style:none;
    font-size:12.5px;
    color:var(--ink-dim);
    line-height:1.7;
  }
  .sanity-list li::before{
    content:"— ";
    color:var(--ink-faint);
  }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-track{ background:var(--bg-0); }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">LIMBUS MIRROR DUNGEON ARCHIVE</div>
  <h1>거울 던전 기록보관소</h1>
  <p>parse_persona.py로 추출한 인격 JSON을 불러와 조회합니다.</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <label class="file-drop" id="fileDrop">
      <span class="big">＋</span>
      인격 JSON 파일 불러오기<br>
      <span style="font-size:11px">(여러 개 선택 가능)</span>
      <input type="file" id="fileInput" accept=".json" multiple>
    </label>

    <div class="search">
      <input type="text" id="searchInput" placeholder="인격명 / 수감자 검색…">
    </div>

    <div class="filter-row" id="rarityFilter"></div>
    <div class="filter-row" id="sinnerFilter"></div>

    <div class="persona-list" id="personaList">
      <div class="empty-sidebar">아직 불러온 인격이 없습니다.<br>위에서 JSON 파일을 선택하세요.</div>
    </div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="placeholder">
      <div class="mark">SELECT A FILE</div>
      <div>왼쪽에서 인격을 불러오고 선택하세요</div>
    </div>
  </main>
</div>

<script>
let personas = [];
let activeIdx = null;
let rarityFilterVal = null;
let sinnerFilterVal = null;

const fileInput = document.getElementById('fileInput');
const fileDrop = document.getElementById('fileDrop');
const personaListEl = document.getElementById('personaList');
const searchInput = document.getElementById('searchInput');
const rarityFilterEl = document.getElementById('rarityFilter');
const sinnerFilterEl = document.getElementById('sinnerFilter');
const mainPanel = document.getElementById('mainPanel');

fileInput.addEventListener('change', e => loadFiles(e.target.files));
fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('dragover'); });
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
fileDrop.addEventListener('drop', e => {
  e.preventDefault();
  fileDrop.classList.remove('dragover');
  loadFiles(e.dataTransfer.files);
});

function loadFiles(fileList){
  const files = Array.from(fileList).filter(f => f.name.endsWith('.json'));
  let pending = files.length;
  if(pending === 0) return;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const data = JSON.parse(ev.target.result);
        personas.push(data);
      }catch(err){
        console.error('파싱 실패:', file.name, err);
      }
      pending--;
      if(pending === 0) onAllLoaded();
    };
    reader.readAsText(file, 'UTF-8');
  });
}

function onAllLoaded(){
  personas.sort((a,b) => (a.sinner||'').localeCompare(b.sinner||'') || (a.rarity||0)-(b.rarity||0));
  buildFilters();
  renderList();
}

function buildFilters(){
  const rarities = [...new Set(personas.map(p => p.rarity).filter(Boolean))].sort();
  rarityFilterEl.innerHTML = rarities.map(r =>
    `<button class="chip" data-rarity="${r}">${r}성</button>`
  ).join('');
  rarityFilterEl.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.rarity;
      rarityFilterVal = (rarityFilterVal === val) ? null : val;
      buildFilters(); sinnerChipsRefresh(); renderList();
    });
    if(String(rarityFilterVal) === btn.dataset.rarity) btn.classList.add('active');
  });

  sinnerChipsRefresh();
}

function sinnerChipsRefresh(){
  const sinners = [...new Set(personas.map(p => p.sinner).filter(Boolean))];
  sinnerFilterEl.innerHTML = sinners.map(s =>
    `<button class="chip" data-sinner="${s}">${s}</button>`
  ).join('');
  sinnerFilterEl.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.sinner;
      sinnerFilterVal = (sinnerFilterVal === val) ? null : val;
      sinnerChipsRefresh(); renderList();
    });
    if(sinnerFilterVal === btn.dataset.sinner) btn.classList.add('active');
  });
}

searchInput.addEventListener('input', renderList);

function renderList(){
  const q = searchInput.value.trim().toLowerCase();
  const filtered = personas
    .map((p, idx) => ({p, idx}))
    .filter(({p}) => {
      if(rarityFilterVal && String(p.rarity) !== rarityFilterVal) return false;
      if(sinnerFilterVal && p.sinner !== sinnerFilterVal) return false;
      if(q && !(`${p.name} ${p.sinner}`.toLowerCase().includes(q))) return false;
      return true;
    });

  if(filtered.length === 0){
    personaListEl.innerHTML = `<div class="empty-sidebar">조건에 맞는 인격이 없습니다.</div>`;
    return;
  }

  personaListEl.innerHTML = filtered.map(({p, idx}) => `
    <div class="persona-item ${idx===activeIdx?'active':''}" data-idx="${idx}">
      <div class="pname">${escapeHtml(p.name || '이름 없음')}</div>
      <div class="pmeta">
        <span class="rarity-dot"></span>
        ${escapeHtml(p.sinner||'')} · ${p.rarity||'?'}성
      </div>
    </div>
  `).join('');

  personaListEl.querySelectorAll('.persona-item').forEach(el => {
    el.addEventListener('click', () => {
      activeIdx = Number(el.dataset.idx);
      renderList();
      renderDetail(personas[activeIdx]);
    });
  });
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function sinColor(sin){
  return `var(--sin-${sin})` || 'var(--gold)';
}

function renderDetail(p){
  const resistOrder = ['참격','관통','타격'];
  const resistHtml = resistOrder.map(type => {
    const r = (p.resistance||{})[type];
    if(!r) return '';
    return `
      <div class="resist-row">
        <span>${type}</span>
        <span class="resist-tag ${r.level}">${r.level} ${r.multiplier||''}</span>
      </div>`;
  }).join('');

  const statsHtml = p.stats ? `
    <div class="stat-row"><span class="k">최대 레벨</span><span class="v">${escapeHtml(p.stats.maxLevel||'-')}</span></div>
    <div class="stat-row"><span class="k">속도</span><span class="v">${escapeHtml(p.stats.speed||'-')}</span></div>
    <div class="stat-row"><span class="k">HP</span><span class="v">${escapeHtml(p.stats.hp||'-')}</span></div>
    <div class="stat-row"><span class="k">출시</span><span class="v">${escapeHtml(p.releaseDate||'-')}</span></div>
    <div class="stat-row"><span class="k">시즌</span><span class="v">${escapeHtml(p.season||'-')}</span></div>
  ` : '<div class="stat-row"><span class="k">데이터 없음</span></div>';

  const skillsHtml = (p.skills||[]).map(s => skillCard(s, false)).join('');
  const defenseHtml = p.defenseSkill ? skillCard(p.defenseSkill, true) : '';

  const passivesHtml = (p.passives||[]).map(pv => `
    <div class="passive-card">
      <div class="ptitle">
        <span class="pname">${escapeHtml(pv.name||'')}</span>
        <span class="ptype">${escapeHtml(pv.type||'')} · ${escapeHtml(pv.resonance||'')}</span>
      </div>
      <div class="pdesc">${escapeHtml(pv.description||'')}</div>
    </div>
  `).join('');

  const syncHtml = (p.syncUpgrades||[]).map(s => `
    <div class="sync-stage">
      <div class="snum">${s.stage}단계<br><span style="color:var(--ink-faint)">${escapeHtml(s.cost||'')}</span></div>
      <div class="seff">${(s.effects||[]).map(escapeHtml).join(' · ')}</div>
    </div>
  `).join('');

  const sanityHtml = p.sanity ? `
    <div style="font-family:var(--font-mono); font-size:12px; color:var(--ink-dim); margin-bottom:10px;">
      패닉 유형: <b style="color:var(--ink)">${escapeHtml(p.sanity.panicType||'-')}</b> — ${escapeHtml(p.sanity.panicEffect||'')}
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div>
        <div style="font-size:11px; color:var(--sin-질투); font-family:var(--font-mono); margin-bottom:6px;">증가 조건</div>
        <ul class="sanity-list">${(p.sanity.increaseConditions||[]).map(c=>`<li>${escapeHtml(c)}</li>`).join('')}</ul>
      </div>
      <div>
        <div style="font-size:11px; color:var(--sin-분노); font-family:var(--font-mono); margin-bottom:6px;">감소 조건</div>
        <ul class="sanity-list">${(p.sanity.decreaseConditions||[]).map(c=>`<li>${escapeHtml(c)}</li>`).join('')}</ul>
      </div>
    </div>
  ` : '';

  mainPanel.innerHTML = `
    <div class="dossier-head">
      <div class="titles">
        <div class="sinner">${escapeHtml(p.sinner||'')}</div>
        <h2>${escapeHtml(p.name||'')}</h2>
        <div class="sub">
          <span>${escapeHtml(p.acquireMethod||'-')}</span>
          <span>${(p.keywords||[]).join(', ')}</span>
        </div>
      </div>
      <div class="stamp">${p.rarity||'?'}급 인격</div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h3>스테이터스</h3>
        ${statsHtml}
      </div>
      <div class="panel">
        <h3>내성 정보</h3>
        ${resistHtml || '<div class="stat-row"><span class="k">데이터 없음</span></div>'}
      </div>
    </div>

    ${skillsHtml || defenseHtml ? `
    <section class="block">
      <h3>전투 스킬</h3>
      ${skillsHtml}
      ${defenseHtml}
    </section>` : ''}

    ${passivesHtml ? `
    <section class="block">
      <h3>패시브</h3>
      ${passivesHtml}
    </section>` : ''}

    ${syncHtml ? `
    <section class="block">
      <h3>동기화 강화</h3>
      ${syncHtml}
    </section>` : ''}

    ${sanityHtml ? `
    <section class="block">
      <h3>정신력 (패닉) 조건</h3>
      ${sanityHtml}
    </section>` : ''}
  `;
}

function skillCard(s, isDefense){
  const type = isDefense ? (s.defenseType||'-') : (s.attackType||'-');
  const sin = s.sinType || '';
  const coinEffects = (s.coinEffects||[]).map(ce => `
    <div class="coin-effect"><span class="cond">${escapeHtml(ce.condition||'')}</span>${escapeHtml(ce.effect||'')}</div>
  `).join('');

  return `
    <div class="skill-card ${isDefense?'defense':''}">
      <div class="skill-head">
        <span class="sname">${escapeHtml(s.name||'')}</span>
        ${sin ? `<span class="sin-tag" style="background:${sinColor(sin)}">${escapeHtml(sin)}</span>` : ''}
      </div>
      <div class="skill-stats">
        <span>${isDefense?'수비':'공격'} 유형 <b>${escapeHtml(type)}</b></span>
        <span>코인 수 <b>${escapeHtml(String(s.coinCount||'-'))}</b></span>
        <span>스킬 위력 <b>${escapeHtml(String(s.skillPower||'-'))}</b></span>
        <span>코인 위력 <b>${escapeHtml(String(s.coinPower||'-'))}</b></span>
        <span>가중치 <b>${escapeHtml(String(s.attackWeight||'-'))}</b></span>
      </div>
      ${coinEffects}
    </div>
  `;
}
</script>

</body>
</html>
